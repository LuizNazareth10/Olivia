name: stress_hrv_mobile
description: App de captura de HRV por câmera com alerta de estresse.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  http: ^1.2.2
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  image: ^4.2.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  fl_chart: ^1.1.1
  provider: ^6.1.5+1
  intl: ^0.20.2
  simple_gradient_text: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
